<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LVO Holdings LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --gold: #b8953f;
  --gold-light: #d4a853;
  --gold-dim: #7a5f1a;
  --gold-border: #b8953f44;
  --text: #e8e6e0;
  --text-dim: #9a9690;
  --text-muted: #5a5650;
  --red: #c0392b;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  cursor: crosshair;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
  opacity: 0.35;
  mix-blend-mode: overlay;
}

#particles-js { position: fixed; inset: 0; z-index: 0; }

.corner {
  position: fixed; width: 60px; height: 60px;
  pointer-events: none; z-index: 2; opacity: 0.3;
}
.corner--tl { top: 32px; left: 32px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--tr { top: 32px; right: 32px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner--bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

.site-label {
  position: fixed; bottom: 36px; left: 0; right: 0;
  text-align: center; font-size: 9px; letter-spacing: 0.3em;
  color: var(--text-muted); text-transform: uppercase; z-index: 10;
  opacity: 0; animation: fadeUp 1s ease 2.8s forwards;
}

#stage {
  position: fixed; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
}

.panel {
  width: 320px;
  background: rgba(0,0,0,0.18);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px 32px 28px;
  position: relative; opacity: 0;
  animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
}
.panel::before {
  content: ''; position: absolute; top: -3px; left: -3px;
  width: 22px; height: 22px;
  border-top: 1px solid rgba(255,255,255,0.3); border-left: 1px solid rgba(255,255,255,0.3);
}
.panel::after {
  content: ''; position: absolute; bottom: -3px; right: -3px;
  width: 22px; height: 22px;
  border-bottom: 1px solid rgba(255,255,255,0.3); border-right: 1px solid rgba(255,255,255,0.3);
}

.wordmark { text-align: center; margin-bottom: 4px; opacity: 0; animation: fadeIn 0.8s 1s forwards; }
.wordmark-main {
  font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300;
  letter-spacing: 0.55em; color: var(--gold); line-height: 1; text-indent: 0.55em;
}
.wordmark-sub {
  font-size: 8px; letter-spacing: 0.42em; color: var(--text-muted);
  text-transform: uppercase; margin-top: 4px; text-indent: 0.42em;
}

.rule {
  width: 100%; display: flex; align-items: center; gap: 8px; margin: 22px 0;
  opacity: 0; animation: fadeIn 0.8s 1.15s forwards;
}
.rule-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(184,149,63,0.2)); }
.rule-line.r { background: linear-gradient(to left, transparent, rgba(184,149,63,0.2)); }
.rule-diamond { width: 4px; height: 4px; background: rgba(184,149,63,0.3); transform: rotate(45deg); }

.auth-form { display: flex; flex-direction: column; gap: 12px; opacity: 0; animation: fadeUp 1s ease 1.3s forwards; }
.auth-form-label { font-size: 8px; letter-spacing: 0.35em; color: var(--text-muted); text-transform: uppercase; }

.timer-wrap { display: flex; align-items: center; gap: 10px; align-self: flex-end; opacity: 0.6; }
.timer-ring { width: 18px; height: 18px; transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: #2a2a2a; stroke-width: 2; }
.timer-ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 2;
  stroke-linecap: round; stroke-dasharray: 44; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.timer-label { font-size: 9px; letter-spacing: 0.2em; color: var(--text-muted); min-width: 30px; }

.input-wrap { position: relative; width: 100%; }
.pw-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.3em;
  padding: 10px 44px 10px 4px; outline: none; transition: border-color 0.3s;
  text-align: center; caret-color: var(--gold);
}
.pw-input::placeholder { color: var(--text-muted); letter-spacing: 0.2em; font-size: 12px; }
.pw-input:focus { border-bottom-color: var(--gold); }
.pw-input.error { border-bottom-color: var(--red); animation: shake 0.4s ease; }

.eye-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 4px; transition: color 0.2s; line-height: 0;
}
.eye-btn:hover { color: var(--gold); }
.totp-hint { font-size: 9px; letter-spacing: 0.15em; color: var(--text-muted); text-align: center; line-height: 1.6; }
.err-msg {
  font-size: 10px; letter-spacing: 0.2em; color: var(--red); text-transform: uppercase;
  min-height: 14px; text-align: center; opacity: 0; transition: opacity 0.3s;
}
.err-msg.show { opacity: 1; }

.auth-btn {
  width: 100%; background: transparent; border: 1px solid var(--gold-border);
  color: var(--gold); font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.35em; text-transform: uppercase; padding: 13px 24px;
  cursor: pointer; transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
  position: relative; overflow: hidden;
}
.auth-btn::before {
  content: ''; position: absolute; inset: 0; background: var(--gold);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1); z-index: 0;
}
.auth-btn:hover::before { transform: scaleX(1); }
.auth-btn:hover { color: var(--black); box-shadow: 0 0 24px #b8953f22; }
.auth-btn span { position: relative; z-index: 1; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-btn:disabled::before { display: none; }

.panel-footer {
  margin-top: 20px; font-size: 8px; color: rgba(255,255,255,0.1);
  letter-spacing: 0.18em; text-align: center; opacity: 0;
  animation: fadeIn 0.6s 1.8s forwards;
}

#success-overlay {
  position: fixed; inset: 0; background: var(--black); z-index: 9000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.6s ease; gap: 16px;
}
#success-overlay.show { opacity: 1; pointer-events: all; }
.success-text {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300;
  letter-spacing: 0.3em; color: var(--gold); opacity: 0;
}
#success-overlay.show .success-text { animation: fadeUp 0.8s ease 0.3s forwards; }
.success-sub { font-size: 9px; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; opacity: 0; }
#success-overlay.show .success-sub { animation: fadeUp 0.8s ease 0.6s forwards; }
.success-bar { width: 220px; height: 1px; background: #2a2a2a; margin-top: 8px; opacity: 0; position: relative; overflow: hidden; }
#success-overlay.show .success-bar { opacity: 1; animation: fadeIn 0.4s ease 0.9s forwards; }
.success-bar-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
#success-overlay.show .success-bar-fill { animation: fillBar 1.6s cubic-bezier(0.22,1,0.36,1) 1s forwards; }

/* ── CONTROL PANEL ── */
#ctrl-toggle {
  position: fixed; bottom: 60px; right: 24px; z-index: 9999;
  background: rgba(10,10,10,0.85); border: 1px solid rgba(184,149,63,0.25);
  color: var(--gold); font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.25em; text-transform: uppercase; padding: 7px 12px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  backdrop-filter: blur(4px);
}
#ctrl-toggle:hover { border-color: var(--gold); background: rgba(184,149,63,0.08); }

#ctrl-panel {
  position: fixed; bottom: 100px; right: 24px; z-index: 9999;
  width: 240px;
  background: rgba(8,8,8,0.92);
  border: 1px solid rgba(184,149,63,0.18);
  backdrop-filter: blur(8px);
  padding: 16px;
  display: none;
  flex-direction: column;
  gap: 14px;
  font-family: 'DM Mono', monospace;
}
#ctrl-panel.open { display: flex; }

.ctrl-section-label {
  font-size: 7px; letter-spacing: 0.4em; color: var(--gold);
  text-transform: uppercase; opacity: 0.6; margin-bottom: 2px;
}

.ctrl-row {
  display: flex; flex-direction: column; gap: 5px;
}

.ctrl-label {
  display: flex; justify-content: space-between;
  font-size: 8px; letter-spacing: 0.18em; color: var(--text-muted);
  text-transform: uppercase;
}
.ctrl-label span { color: var(--text-dim); font-size: 8px; }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 1px; background: rgba(255,255,255,0.1);
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  background: var(--gold); border-radius: 0; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 10px; height: 10px;
  background: var(--gold); border: none; border-radius: 0; cursor: pointer;
}

.ctrl-color-row {
  display: flex; align-items: center; gap: 10px;
}
.ctrl-color-row label {
  font-size: 8px; letter-spacing: 0.18em; color: var(--text-muted);
  text-transform: uppercase; flex: 1;
}
input[type=color] {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 18px; border: 1px solid rgba(255,255,255,0.15);
  background: none; cursor: pointer; padding: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; }

.ctrl-divider { height: 1px; background: rgba(255,255,255,0.05); }

.preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
.preset-btn {
  font-family: 'DM Mono', monospace; font-size: 7px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-muted);
  background: transparent; border: 1px solid rgba(255,255,255,0.08);
  padding: 5px 8px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.preset-btn:hover { border-color: var(--gold); color: var(--gold); }

@keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { to { opacity: 1; } }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes fillBar { from { width: 0; } to { width: 100%; } }
@media (max-width: 420px) { .panel { width: 88vw; padding: 32px 22px 24px; } }
</style>
</head>
<body>

<canvas id="shader-bg" style="position:fixed;inset:0;z-index:0;width:100%;height:100%;"></canvas>
<div id="particles-js"></div>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="site-label">lvo-cloud.cloud &nbsp;·&nbsp; private access</div>

<div id="stage">
  <div class="panel">
    <div class="wordmark">
      <div class="wordmark-main">LVO</div>
      <div class="wordmark-sub">Holdings LLC</div>
    </div>
    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line r"></div>
    </div>
    <div class="auth-form" id="auth-form">
      <label class="auth-form-label" for="pw-input">Authenticator Code</label>
      <div class="timer-wrap" id="timer-wrap">
        <svg class="timer-ring" viewBox="0 0 18 18">
          <circle class="timer-ring-bg" cx="9" cy="9" r="7"/>
          <circle class="timer-ring-fill" id="timer-ring-fill" cx="9" cy="9" r="7"/>
        </svg>
        <span class="timer-label" id="timer-label">--s</span>
      </div>
      <div class="input-wrap">
        <input class="pw-input" id="pw-input" type="password"
          placeholder="· · · · · ·" autocomplete="one-time-code"
          inputmode="numeric" spellcheck="false" maxlength="6">
        <button class="eye-btn" id="eye-btn" type="button" onclick="toggleEye()">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="totp-hint">Enter the 6-digit code for LVO Holdings LLC</p>
      <div class="err-msg" id="err-msg">Invalid access code</div>
      <button class="auth-btn" id="auth-btn" onclick="attemptLogin()">
        <span id="btn-label">Enter</span>
      </button>
    </div>
    <div class="panel-footer">© LVO Holdings — AUTHORIZED ACCESS ONLY</div>
  </div>
</div>

<div id="success-overlay">
  <div class="success-text">Access Granted</div>
  <div class="success-sub">Routing to Command Center</div>
  <div class="success-bar"><div class="success-bar-fill"></div></div>
</div>

<!-- CONTROL PANEL -->
<button id="ctrl-toggle" onclick="toggleCtrl()">⚙ Customize</button>
<div id="ctrl-panel">
  <div>
    <div class="ctrl-section-label">Presets</div>
    <div class="preset-row">
      <button class="preset-btn" onclick="applyPreset('original')">Original</button>
      <button class="preset-btn" onclick="applyPreset('grey')">Grey</button>
      <button class="preset-btn" onclick="applyPreset('ember')">Ember</button>
      <button class="preset-btn" onclick="applyPreset('void')">Void</button>
      <button class="preset-btn" onclick="applyPreset('gold')">Gold</button>
    </div>
  </div>

  <div class="ctrl-divider"></div>

  <div class="ctrl-row">
    <div class="ctrl-label">Brightness <span id="lbl-brightness">0.60</span></div>
    <input type="range" id="sl-brightness" min="0.1" max="1.5" step="0.01" value="0.60"
      oninput="setUniform('brightness', +this.value); document.getElementById('lbl-brightness').textContent = (+this.value).toFixed(2)">
  </div>

  <div class="ctrl-row">
    <div class="ctrl-label">Speed <span id="lbl-speed">0.18</span></div>
    <input type="range" id="sl-speed" min="0.01" max="1.0" step="0.01" value="0.18"
      oninput="setUniform('speed', +this.value); document.getElementById('lbl-speed').textContent = (+this.value).toFixed(2)">
  </div>

  <div class="ctrl-row">
    <div class="ctrl-label">Density <span id="lbl-scale">0.55</span></div>
    <input type="range" id="sl-scale" min="0.2" max="1.2" step="0.01" value="0.55"
      oninput="setUniform('scale', +this.value); document.getElementById('lbl-scale').textContent = (+this.value).toFixed(2)">
  </div>

  <div class="ctrl-divider"></div>

  <div class="ctrl-color-row">
    <label>Cloud Color</label>
    <input type="color" id="col-cloud" value="#a0b8d8" oninput="setColor('cloud', this.value)">
  </div>
  <div class="ctrl-color-row">
    <label>Fog Color</label>
    <input type="color" id="col-fog" value="#000510" oninput="setColor('fog', this.value)">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
<script>
const API_BASE = 'https://lvo-setup.vercel.app';
const DASHBOARD_URL = 'http://online.lvo-cloud.cloud/';

particlesJS("particles-js", {
  particles: {
    number: { value: 55, density: { enable: true, value_area: 900 } },
    color: { value: "#b8953f" },
    shape: { type: "circle", stroke: { width: 0, color: "#000" } },
    opacity: { value: 0.22, random: true, anim: { enable: true, speed: 0.6, opacity_min: 0.05, sync: false } },
    size: { value: 2, random: true, anim: { enable: false } },
    line_linked: { enable: true, distance: 160, color: "#b8953f", opacity: 0.09, width: 1 },
    move: { enable: true, speed: 1.2, direction: "none", random: true, straight: false, out_mode: "out" }
  },
  interactivity: {
    detect_on: "canvas",
    events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
    modes: { grab: { distance: 180, line_linked: { opacity: 0.3 } }, push: { particles_nb: 2 } }
  },
  retina_detect: true
});

const CIRCUMFERENCE = 2 * Math.PI * 7;
function updateTimer() {
  const now = Math.floor(Date.now() / 1000);
  const remaining = 30 - (now % 30);
  const fill = document.getElementById('timer-ring-fill');
  const label = document.getElementById('timer-label');
  fill.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / 30);
  label.textContent = remaining + 's';
  fill.style.stroke = remaining <= 5 ? 'var(--red)' : 'var(--gold)';
  label.style.color = remaining <= 5 ? 'var(--red)' : 'var(--text-muted)';
}
updateTimer();
setInterval(updateTimer, 1000);

const pwInput  = document.getElementById('pw-input');
const errMsg   = document.getElementById('err-msg');
const authBtn  = document.getElementById('auth-btn');
const btnLabel = document.getElementById('btn-label');

pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
pwInput.addEventListener('input', () => {
  pwInput.classList.remove('error');
  errMsg.classList.remove('show');
  pwInput.value = pwInput.value.replace(/\D/g, '').slice(0, 6);
  if (pwInput.value.length === 6) setTimeout(attemptLogin, 120);
});

async function attemptLogin() {
  const code = pwInput.value.trim();
  if (!code || code.length !== 6) { showError('Enter the 6-digit code from your authenticator'); return; }
  authBtn.disabled = true;
  btnLabel.textContent = 'Verifying...';
  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (res.ok && data.token) {
      sessionStorage.setItem('lvo_token', data.token);
      showSuccess();
    } else if (res.status === 429) {
      showError(data.error || 'Too many attempts. Wait and try again.');
      authBtn.disabled = true;
      btnLabel.textContent = 'Locked';
    } else {
      const left = data.attemptsLeft !== undefined ? ` (${data.attemptsLeft} left)` : '';
      showError((data.error || 'Invalid access code') + left);
      resetInput();
      authBtn.disabled = false;
      btnLabel.textContent = 'Enter';
    }
  } catch (err) {
    showError('Connection error. Please try again.');
    authBtn.disabled = false;
    btnLabel.textContent = 'Enter';
  }
}

function showError(msg) {
  errMsg.textContent = msg;
  errMsg.classList.add('show');
  pwInput.classList.add('error');
  setTimeout(() => pwInput.classList.remove('error'), 600);
}
function resetInput() {
  setTimeout(() => { pwInput.value = ''; errMsg.classList.remove('show'); }, 800);
}
function showSuccess() {
  document.getElementById('success-overlay').classList.add('show');
  setTimeout(() => { window.location.href = DASHBOARD_URL; }, 3000);
}
function toggleEye() {
  const input = document.getElementById('pw-input');
  const icon = document.getElementById('eye-icon');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  icon.innerHTML = isHidden
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

// ── CONTROL PANEL ──
let shaderMaterial = null;

function toggleCtrl() {
  document.getElementById('ctrl-panel').classList.toggle('open');
}

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return {r,g,b};
}

function setUniform(name, val) {
  if (!shaderMaterial) return;
  if (name === 'brightness') shaderMaterial.uniforms.u_brightness.value = val;
  if (name === 'speed')      shaderMaterial.uniforms.u_speed.value = val;
  if (name === 'scale')      shaderMaterial.uniforms.u_scale.value = val;
}

function setColor(target, hex) {
  if (!shaderMaterial) return;
  const c = hexToRGB(hex);
  if (target === 'cloud') shaderMaterial.uniforms.u_color1.value.setRGB(c.r, c.g, c.b);
  if (target === 'fog')   shaderMaterial.uniforms.u_fog_color.value.setRGB(c.r, c.g, c.b);
}

const PRESETS = {
  original: { brightness:0.60, speed:0.18, scale:0.55, cloud:'#a0b8d8', fog:'#000510' },
  grey:     { brightness:0.55, speed:0.18, scale:0.55, cloud:'#b0b0b0', fog:'#080808' },
  ember:    { brightness:0.65, speed:0.22, scale:0.60, cloud:'#d4703a', fog:'#0d0500' },
  void:     { brightness:0.40, speed:0.10, scale:0.45, cloud:'#4a3a6e', fog:'#000000' },
  gold:     { brightness:0.60, speed:0.15, scale:0.50, cloud:'#c9a84c', fog:'#080600' },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p || !shaderMaterial) return;
  document.getElementById('sl-brightness').value = p.brightness;
  document.getElementById('lbl-brightness').textContent = p.brightness.toFixed(2);
  document.getElementById('sl-speed').value = p.speed;
  document.getElementById('lbl-speed').textContent = p.speed.toFixed(2);
  document.getElementById('sl-scale').value = p.scale;
  document.getElementById('lbl-scale').textContent = p.scale.toFixed(2);
  document.getElementById('col-cloud').value = p.cloud;
  document.getElementById('col-fog').value = p.fog;
  setUniform('brightness', p.brightness);
  setUniform('speed', p.speed);
  setUniform('scale', p.scale);
  setColor('cloud', p.cloud);
  setColor('fog', p.fog);
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function() {
  const canvas = document.getElementById('shader-bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setPixelRatio(0.5);
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const clock = new THREE.Clock();

  const fragmentShader = `
#ifdef GL_ES
precision highp float;
#endif
uniform float u_time;
uniform vec4 u_mouse;
uniform vec2 u_resolution;
uniform float u_brightness;
uniform bool u_fog;
uniform float u_scale;
uniform float u_scale2;
uniform int u_iters;
uniform vec3 u_color1;
uniform vec3 u_fog_color;
uniform float u_speed;

mat2 rot(in float a) { float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }
const mat3 m3=mat3(0.33338,0.56034,-0.71817,-0.87887,0.32651,-0.15323,0.15162,0.69596,0.61339)*1.93;
float mag2(vec2 p){return dot(p,p);}
float linstep(in float mn,in float mx,in float x){return clamp((x-mn)/(mx-mn),0.,1.);}
float prm1=0.;
vec2 bsMo=vec2(0);
vec2 disp(float t){return vec2(sin(t*0.22)*1.,cos(t*0.175)*1.)*2.;}
float time(){return 1000.+u_time*u_speed;}

vec2 map(vec3 p){
  vec3 p2=p; p2.xy-=disp(p.z).xy;
  p.xy*=rot(sin(p.z+time())*(0.1+prm1*0.05)+time()*0.09);
  float cl=mag2(p2.xy); float d=0.;
  p*=u_scale; float z=1.; float trk=1.; float dspAmp=0.1+prm1*0.2;
  for(int i=0;i<u_iters;i++){
    p+=sin(p.zxy*0.75*trk+time()*trk*.8)*dspAmp;
    d-=abs(dot(cos(p),sin(p.yzx))*z);
    z*=u_scale2; trk*=1.4; p=p*m3;
  }
  d=abs(d+prm1*3.)+prm1*.3-2.5+bsMo.y;
  return vec2(d+cl*.2+0.25,cl);
}

vec4 render(in vec3 ro,in vec3 rd,float time){
  vec4 rez=vec4(0); const float ldst=8.;
  vec3 lpos=vec3(disp(time+ldst)*0.5,time+ldst);
  float t=1.5; float fogT=0.;
  for(int i=0;i<130;i++){
    if(rez.a>0.99) break;
    vec3 pos=ro+t*rd; vec2 mpv=map(pos);
    float den=clamp(mpv.x-0.3,0.,1.)*1.12;
    float dn=clamp((mpv.x+2.),0.,3.); vec4 col=vec4(0);
    if(mpv.x>0.6){
      col=vec4(u_color1,0.08); col*=den*den*den;
      col.rgb*=linstep(4.,-2.5,mpv.x)*2.3;
      float dif=clamp((den-map(pos+.8).x)/9.,0.001,1.);
      dif+=clamp((den-map(pos+.35).x)/2.5,0.001,1.);
      col.xyz*=den*(vec3(0.005,.045,.075)+1.5*vec3(0.033,0.07,0.03)*dif);
    }
    float fogC=exp(t*0.2-2.2);
    if(u_fog) col.rgba+=vec4(u_fog_color,0.1)*clamp(fogC-fogT,0.,1.);
    fogT=fogC; rez=rez+col*(1.-rez.a);
    t+=clamp(0.5-dn*dn*.05,0.09,0.3);
  }
  return clamp(rez,0.0,1.0);
}

float getsat(vec3 c){float mi=min(min(c.x,c.y),c.z);float ma=max(max(c.x,c.y),c.z);return(ma-mi)/(ma+1e-7);}
vec3 iLerp(in vec3 a,in vec3 b,in float x){
  vec3 ic=mix(a,b,x)+vec3(1e-6,0.,0.);
  float sd=abs(getsat(ic)-mix(getsat(a),getsat(b),x));
  vec3 dir=normalize(vec3(2.*ic.x-ic.y-ic.z,2.*ic.y-ic.x-ic.z,2.*ic.z-ic.y-ic.x));
  float lgt=dot(vec3(1.0),ic); float ff=dot(dir,normalize(ic));
  ic+=1.5*dir*sd*ff*lgt; return clamp(ic,0.,1.);
}

void main(){
  vec2 q=gl_FragCoord.xy/u_resolution.xy;
  vec2 p=(gl_FragCoord.xy-0.5*u_resolution.xy)/u_resolution.y;
  bsMo=(u_mouse.xy-0.5*u_resolution.xy)/u_resolution.y;
  float scaledTime=time()*3.0;
  vec3 ro=vec3(0,0,scaledTime);
  ro+=vec3(sin(time())*0.5,sin(time()*1.)*0.,0);
  float dspAmp=.85; ro.xy+=disp(ro.z)*dspAmp;
  float tgtDst=3.5;
  vec3 target=normalize(ro-vec3(disp(scaledTime+tgtDst)*dspAmp,scaledTime+tgtDst));
  ro.x-=bsMo.x*2.;
  vec3 rightdir=normalize(cross(target,vec3(0,1,0)));
  vec3 updir=normalize(cross(rightdir,target));
  rightdir=normalize(cross(updir,target));
  vec3 rd=normalize((p.x*rightdir+p.y*updir)*1.-target);
  rd.xy*=rot(-disp(scaledTime+3.5).x*0.2+bsMo.x);
  vec4 scn=render(ro,rd,scaledTime);
  vec3 col=scn.rgb;
  col=iLerp(col.bgr,col.rgb,clamp(1.-prm1,0.05,1.));
  col=pow(col,vec3(.55,0.65,0.6))*vec3(1.,.97,.9);
  col*=pow(16.0*q.x*q.y*(1.0-q.x)*(1.0-q.y),0.12)*0.7+0.3;
  gl_FragColor=vec4(col*u_brightness,1.0);
}`;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      u_time:       { value: 0 },
      u_fog:        { value: true },
      u_speed:      { value: 0.18 },
      u_scale:      { value: 0.55 },
      u_scale2:     { value: 0.50 },
      u_iters:      { value: 7 },
      u_color1:     { value: new THREE.Color("#a0b8d8") },
      u_fog_color:  { value: new THREE.Color("#000510") },
      u_brightness: { value: 0.6 },
      u_mouse:      { value: new THREE.Vector4() },
      u_resolution: { value: new THREE.Vector2(window.innerWidth*0.5, window.innerHeight*0.5) },
    },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader
  });

  shaderMaterial = material;

  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), material);
  scene.add(quad);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.u_resolution.value.set(window.innerWidth*0.5, window.innerHeight*0.5);
  });

  let lastTime = 0;
  function render(ts) {
    requestAnimationFrame(render);
    if (ts - lastTime < 1000/24) return;
    lastTime = ts;
    if (clock.getElapsedTime() > 21600) clock.start();
    material.uniforms.u_time.value = clock.getElapsedTime();
    renderer.render(scene, camera);
  }
  requestAnimationFrame(render);
})();
</script>
