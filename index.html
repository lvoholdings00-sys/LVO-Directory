<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LVO Holdings LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ─── ROOT ─── */
:root {
  --black: #0a0a0a;
  --surface: #111111;
  --border: #2a2a2a;
  --border-gold: #b8953f44;
  --gold: #b8953f;
  --gold-light: #d4a853;
  --gold-dim: #7a5f1a;
  --gold-glow: #b8953f14;
  --text: #e8e6e0;
  --text-dim: #9a9690;
  --text-muted: #5a5650;
  --red: #c0392b;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

/* ─── NOISE GRAIN OVERLAY ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
  opacity: 0.35;
  mix-blend-mode: overlay;
}

/* ─── PARTICLES CANVAS ─── */
#particles-js {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ─── RADIAL GLOW CENTER ─── */
.center-glow {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #b8953f0d 0%, #b8953f05 40%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* ─── CORNER LINES ─── */
.corner {
  position: fixed;
  width: 60px;
  height: 60px;
  pointer-events: none;
  z-index: 2;
  opacity: 0.3;
}
.corner--tl { top: 32px; left: 32px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--tr { top: 32px; right: 32px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner--bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

/* ─── HORIZONTAL RULE LINES ─── */
.h-line {
  position: fixed;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border) 80%, transparent 100%);
  pointer-events: none;
  z-index: 2;
  opacity: 0.5;
}
.h-line--top { top: 80px; }
.h-line--bottom { bottom: 80px; }

/* ─── SITE COORDINATES LABEL — CENTERED ─── */
.site-label {
  position: fixed;
  bottom: 36px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  z-index: 10;
  white-space: nowrap;
  opacity: 0;
  animation: fadeUp 1s ease 2.8s forwards;
}

/* ─── MAIN STAGE ─── */
#stage {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* ─── MOTH SVG ─── */
.moth-wrap {
  opacity: 0;
  transform: translateY(-16px);
  animation: descend 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
  margin-bottom: 32px;
}

.auth-moth {
  width: 100px;
  height: 100px;
  filter: drop-shadow(0 0 18px #b8953f28);
  animation: mothFloat 5s ease-in-out infinite;
}

.moth-wing-left, .moth-wing-right {
  transform-origin: 50% 55%;
  animation: wingBeat 4s ease-in-out infinite alternate;
}
.moth-wing-right { animation-direction: alternate-reverse; }

@keyframes wingBeat {
  0%   { transform: scaleX(1) rotate(-1deg); }
  100% { transform: scaleX(0.82) rotate(2deg); }
}
@keyframes mothFloat {
  0%, 100% { transform: translateY(0); }
  50%  { transform: translateY(-7px); }
}

/* ─── WORDMARK ─── */
.wordmark {
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
  text-align: center;
  margin-bottom: 6px;
}

.wordmark-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 300;
  letter-spacing: 0.55em;
  color: var(--gold);
  line-height: 1;
  text-indent: 0.55em;
}

.wordmark-sub {
  font-size: 9px;
  letter-spacing: 0.42em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 6px;
  text-indent: 0.42em;
}

/* ─── RULE DIVIDER ─── */
.rule {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 28px 0 28px;
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

/* ─── PASSWORD FORM ─── */
.auth-form {
  opacity: 0;
  animation: fadeUp 1s ease 1.6s forwards;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 320px;
}

.auth-form-label {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: var(--text-muted);
  text-transform: uppercase;
  align-self: flex-start;
}

/* ─── TOTP HINT ─── */
.totp-hint {
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
  align-self: center;
}

/* ─── TIMER RING ─── */
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  align-self: flex-end;
  opacity: 0.6;
}

.timer-ring {
  width: 18px;
  height: 18px;
  transform: rotate(-90deg);
}

.timer-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 2;
}

.timer-ring-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 44;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}

.timer-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  min-width: 30px;
}

/* ─── INPUT ─── */
.input-wrap {
  position: relative;
  width: 100%;
}

.pw-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  letter-spacing: 0.3em;
  padding: 10px 44px 10px 4px;
  outline: none;
  transition: border-color 0.3s;
  text-align: center;
  caret-color: var(--gold);
}

.pw-input::placeholder {
  color: var(--text-muted);
  letter-spacing: 0.2em;
  font-size: 12px;
}

.pw-input:focus { border-bottom-color: var(--gold); }
.pw-input.error { border-bottom-color: var(--red); animation: shake 0.4s ease; }

.eye-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  transition: color 0.2s;
  line-height: 0;
}
.eye-btn:hover { color: var(--gold); }

.auth-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border-gold);
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 13px 24px;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
  margin-top: 4px;
  position: relative;
  overflow: hidden;
}

.auth-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 0;
}

.auth-btn:hover::before { transform: scaleX(1); }
.auth-btn:hover { color: var(--black); box-shadow: 0 0 24px #b8953f22; }
.auth-btn span { position: relative; z-index: 1; }

.auth-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.auth-btn:disabled::before { display: none; }

/* ─── ERROR MESSAGE ─── */
.err-msg {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--red);
  text-transform: uppercase;
  min-height: 16px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s;
}
.err-msg.show { opacity: 1; }

/* ─── SUCCESS OVERLAY ─── */
#success-overlay {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 9000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  gap: 16px;
}

#success-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.success-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--gold);
  opacity: 0;
}

#success-overlay.show .success-text {
  animation: fadeUp 0.8s ease 0.3s forwards;
}

.success-sub {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  opacity: 0;
}
#success-overlay.show .success-sub {
  animation: fadeUp 0.8s ease 0.6s forwards;
}

.success-bar {
  width: 220px;
  height: 1px;
  background: var(--border);
  margin-top: 8px;
  opacity: 0;
  position: relative;
  overflow: hidden;
}
#success-overlay.show .success-bar {
  opacity: 1;
  animation: fadeIn 0.4s ease 0.9s forwards;
}
.success-bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
}
#success-overlay.show .success-bar-fill {
  animation: fillBar 1.6s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
}

/* ─── KEYFRAMES ─── */
@keyframes descend {
  from { opacity: 0; transform: translateY(-24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
}
@keyframes fillBar {
  from { width: 0; }
  to   { width: 100%; }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- Particles -->
<div id="particles-js"></div>

<!-- Atmosphere -->
<div class="center-glow"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>
<div class="h-line h-line--top"></div>
<div class="h-line h-line--bottom"></div>

<!-- CENTERED bottom label -->
<div class="site-label">lvo-cloud.cloud &nbsp;·&nbsp; private access</div>

<!-- Main stage -->
<div id="stage">

  <!-- Moth -->
  <div class="moth-wrap">
    <svg class="auth-moth" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="62" rx="5" ry="18" fill="#7a5f1a"/>
      <ellipse cx="60" cy="62" rx="3.5" ry="16" fill="#b8953f"/>
      <circle cx="60" cy="42" r="6" fill="#b8953f"/>
      <line x1="60" y1="38" x2="44" y2="24" stroke="#b8953f" stroke-width="1.2"/>
      <circle cx="43" cy="23" r="2" fill="#d4a853"/>
      <line x1="60" y1="38" x2="76" y2="24" stroke="#b8953f" stroke-width="1.2"/>
      <circle cx="77" cy="23" r="2" fill="#d4a853"/>
      <g class="moth-wing-left">
        <path d="M57 55 Q30 35 18 50 Q14 70 30 75 Q45 78 57 68 Z" fill="#b8953f" opacity="0.85"/>
        <path d="M57 65 Q35 68 25 82 Q28 95 42 90 Q54 85 57 72 Z" fill="#9a7a30" opacity="0.8"/>
        <path d="M57 57 Q40 45 22 52" stroke="#d4a853" stroke-width="0.7" fill="none" opacity="0.6"/>
        <path d="M57 62 Q42 58 28 65" stroke="#d4a853" stroke-width="0.5" fill="none" opacity="0.5"/>
        <path d="M57 66 Q45 72 32 80" stroke="#d4a853" stroke-width="0.5" fill="none" opacity="0.5"/>
      </g>
      <g class="moth-wing-right">
        <path d="M63 55 Q90 35 102 50 Q106 70 90 75 Q75 78 63 68 Z" fill="#b8953f" opacity="0.85"/>
        <path d="M63 65 Q85 68 95 82 Q92 95 78 90 Q66 85 63 72 Z" fill="#9a7a30" opacity="0.8"/>
        <path d="M63 57 Q80 45 98 52" stroke="#d4a853" stroke-width="0.7" fill="none" opacity="0.6"/>
        <path d="M63 62 Q78 58 92 65" stroke="#d4a853" stroke-width="0.5" fill="none" opacity="0.5"/>
        <path d="M63 66 Q75 72 88 80" stroke="#d4a853" stroke-width="0.5" fill="none" opacity="0.5"/>
      </g>
      <circle cx="35" cy="60" r="5" fill="#0a0a0a" opacity="0.5"/>
      <circle cx="35" cy="60" r="3" fill="#d4a853" opacity="0.4"/>
      <circle cx="85" cy="60" r="5" fill="#0a0a0a" opacity="0.5"/>
      <circle cx="85" cy="60" r="3" fill="#d4a853" opacity="0.4"/>
    </svg>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">
    <div class="wordmark-main">LVO</div>
    <div class="wordmark-sub">Holdings LLC</div>
  </div>

  <!-- Divider -->
  <div class="rule"></div>

  <!-- Auth form -->
  <div class="auth-form" id="auth-form">
    <label class="auth-form-label" for="pw-input">Authenticator Code</label>

    <!-- Countdown timer -->
    <div class="timer-wrap" id="timer-wrap">
      <svg class="timer-ring" viewBox="0 0 18 18">
        <circle class="timer-ring-bg" cx="9" cy="9" r="7"/>
        <circle class="timer-ring-fill" id="timer-ring-fill" cx="9" cy="9" r="7"/>
      </svg>
      <span class="timer-label" id="timer-label">--s</span>
    </div>

    <div class="input-wrap">
      <input
        class="pw-input"
        id="pw-input"
        type="password"
        placeholder="· · · · · ·"
        autocomplete="one-time-code"
        inputmode="numeric"
        spellcheck="false"
        maxlength="6"
      >
      <button class="eye-btn" id="eye-btn" type="button" title="Toggle visibility" onclick="toggleEye()">
        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <p class="totp-hint">Enter<br>the 6-digit code for LVO Holdings LLC</p>

    <div class="err-msg" id="err-msg">Invalid access code</div>
    <button class="auth-btn" id="auth-btn" onclick="attemptLogin()">
      <span id="btn-label">Enter</span>
    </button>
  </div>

</div>

<!-- Success overlay -->
<div id="success-overlay">
  <div class="success-text">Access Granted</div>
  <div class="success-sub">Routing to Command Center</div>
  <div class="success-bar">
    <div class="success-bar-fill"></div>
  </div>
</div>

<!-- particles.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────
// Your Vercel deployment URL (no trailing slash)
const API_BASE = 'https://lvo-setup.vercel.app';  
const DASHBOARD_URL = 'http://online.lvo-cloud.cloud/';

// ─── PARTICLES ────────────────────────────────────────────
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 55, "density": { "enable": true, "value_area": 900 } },
    "color": { "value": "#b8953f" },
    "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000000" } },
    "opacity": {
      "value": 0.22, "random": true,
      "anim": { "enable": true, "speed": 0.6, "opacity_min": 0.05, "sync": false }
    },
    "size": { "value": 2, "random": true, "anim": { "enable": false } },
    "line_linked": { "enable": true, "distance": 160, "color": "#b8953f", "opacity": 0.09, "width": 1 },
    "move": { "enable": true, "speed": 1.2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
  },
  "interactivity": {
    "detect_on": "canvas",
    "events": {
      "onhover": { "enable": true, "mode": "grab" },
      "onclick": { "enable": true, "mode": "push" },
      "resize": true
    },
    "modes": {
      "grab": { "distance": 180, "line_linked": { "opacity": 0.3 } },
      "push": { "particles_nb": 2 }
    }
  },
  "retina_detect": true
});

// ─── TOTP COUNTDOWN TIMER ────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 7; // r=7

function updateTimer() {
  const now = Math.floor(Date.now() / 1000);
  const secondsInPeriod = now % 30;
  const remaining = 30 - secondsInPeriod;
  const fraction = remaining / 30;

  const fill = document.getElementById('timer-ring-fill');
  const label = document.getElementById('timer-label');

  fill.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  label.textContent = remaining + 's';

  // Warn when code is about to expire
  if (remaining <= 5) {
    fill.style.stroke = 'var(--red)';
    label.style.color = 'var(--red)';
  } else {
    fill.style.stroke = 'var(--gold)';
    label.style.color = 'var(--text-muted)';
  }
}

updateTimer();
setInterval(updateTimer, 1000);

// ─── AUTH LOGIC ───────────────────────────────────────────
const pwInput  = document.getElementById('pw-input');
const errMsg   = document.getElementById('err-msg');
const authBtn  = document.getElementById('auth-btn');
const btnLabel = document.getElementById('btn-label');

// Enter key support
pwInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

// Auto-submit when 6 digits entered
pwInput.addEventListener('input', () => {
  pwInput.classList.remove('error');
  errMsg.classList.remove('show');

  // Strip non-digits
  pwInput.value = pwInput.value.replace(/\D/g, '').slice(0, 6);

  if (pwInput.value.length === 6) {
    setTimeout(attemptLogin, 120); // brief pause so user sees full code
  }
});

async function attemptLogin() {
  const code = pwInput.value.trim();
  if (!code || code.length !== 6) {
    showError('Enter the 6-digit code from your authenticator');
    return;
  }

  // Loading state
  authBtn.disabled = true;
  btnLabel.textContent = 'Verifying...';

  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });

    const data = await res.json();

    if (res.ok && data.token) {
      // Store JWT for use on dashboard
      sessionStorage.setItem('lvo_token', data.token);
      showSuccess();
    } else if (res.status === 429) {
      showError(data.error || 'Too many attempts. Wait and try again.');
      authBtn.disabled = true;
      btnLabel.textContent = 'Locked';
    } else {
      const left = data.attemptsLeft !== undefined ? ` (${data.attemptsLeft} left)` : '';
      showError((data.error || 'Invalid access code') + left);
      resetInput();
      authBtn.disabled = false;
      btnLabel.textContent = 'Enter';
    }
  } catch (err) {
    showError('Connection error. Please try again.');
    authBtn.disabled = false;
    btnLabel.textContent = 'Enter';
  }
}

function showError(msg) {
  errMsg.textContent = msg;
  errMsg.classList.add('show');
  pwInput.classList.add('error');
  setTimeout(() => pwInput.classList.remove('error'), 600);
}

function resetInput() {
  setTimeout(() => {
    pwInput.value = '';
    errMsg.classList.remove('show');
  }, 800);
}

function showSuccess() {
  document.getElementById('success-overlay').classList.add('show');
  setTimeout(() => {
    window.location.href = DASHBOARD_URL;
  }, 3000);
}

function toggleEye() {
  const input = document.getElementById('pw-input');
  const icon  = document.getElementById('eye-icon');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  icon.innerHTML = isHidden
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}
</script>
</body>
</html>
